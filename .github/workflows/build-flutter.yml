name: Build Flutter APK (Fallback Worker)

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: 'Job ID from Bot'
        required: true
      userId:
        description: 'User ID'
        required: true
      payload:
        description: 'Build Payload (JSON)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download & Prepare Project
        env:
          PAYLOAD: ${{ github.event.inputs.payload }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Parse payload
          ZIP_ASSET_URL=$(echo "$PAYLOAD" | jq -r '.zipAssetUrl // empty')
          ZIP_RELEASE_TAG=$(echo "$PAYLOAD" | jq -r '.zipReleaseTag // empty')
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.appName // "My App"')
          BUILD_TYPE=$(echo "$PAYLOAD" | jq -r '.buildType // "release"')

          echo "📱 App: $APP_NAME"
          echo "🔨 Build Type: $BUILD_TYPE"

          if [ -n "$ZIP_ASSET_URL" ]; then
            echo "📦 Downloading ZIP from GitHub Release asset..."
            curl -L \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$ZIP_ASSET_URL" -o project.zip

            if [ ! -f project.zip ] || [ ! -s project.zip ]; then
              echo "❌ Failed to download ZIP"
              exit 1
            fi

            echo "📂 Extracting project..."
            mkdir -p project-raw
            unzip -q project.zip -d project-raw

            # Find the actual project root (handle nested directories)
            # Look for pubspec.yaml to identify Flutter project root
            PROJECT_ROOT=$(find project-raw -name "pubspec.yaml" -maxdepth 3 | head -1 | xargs dirname 2>/dev/null || echo "")

            if [ -z "$PROJECT_ROOT" ]; then
              echo "❌ No pubspec.yaml found — this doesn't look like a Flutter project"
              echo "Contents of extracted ZIP:"
              ls -la project-raw/
              exit 1
            fi

            echo "✅ Found Flutter project at: $PROJECT_ROOT"
            mv "$PROJECT_ROOT" project
          else
            echo "❌ No project source provided in payload"
            echo "Payload: $PAYLOAD"
            exit 1
          fi

          # Verify project structure
          echo "📋 Project contents:"
          ls -la project/

      - name: Build APK
        run: |
          cd project
          BUILD_TYPE=$(echo '${{ github.event.inputs.payload }}' | jq -r '.buildType // "release"')

          flutter clean
          flutter pub get

          if [ "$BUILD_TYPE" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.jobId }}
          path: |
            project/build/app/outputs/flutter-apk/app-release.apk
            project/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
