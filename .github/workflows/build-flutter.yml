name: Build Flutter APK (Fallback Worker)

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: 'Job ID from Bot'
        required: true
      userId:
        description: 'User ID'
        required: true
      payload:
        description: 'Build Payload (JSON)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download & Prepare Project
        env:
          PAYLOAD: ${{ github.event.inputs.payload }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Parse payload
          ZIP_ASSET_URL=$(echo "$PAYLOAD" | jq -r '.zipAssetUrl // empty')
          ZIP_RELEASE_TAG=$(echo "$PAYLOAD" | jq -r '.zipReleaseTag // empty')
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.appName // "My App"')
          BUILD_TYPE=$(echo "$PAYLOAD" | jq -r '.buildType // "release"')

          echo "📱 App: $APP_NAME"
          echo "🔨 Build Type: $BUILD_TYPE"

          if [ -n "$ZIP_ASSET_URL" ]; then
            echo "📦 Downloading ZIP from GitHub Release asset..."
            curl -L \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$ZIP_ASSET_URL" -o project.zip

            if [ ! -f project.zip ] || [ ! -s project.zip ]; then
              echo "❌ Failed to download ZIP"
              exit 1
            fi

            echo "📂 Extracting project..."
            mkdir -p project-raw
            unzip -q project.zip -d project-raw

            # Find the actual project root (handle nested directories)
            # Look for pubspec.yaml to identify Flutter project root
            PROJECT_ROOT=$(find project-raw -name "pubspec.yaml" -maxdepth 3 | head -1 | xargs dirname 2>/dev/null || echo "")

            if [ -z "$PROJECT_ROOT" ]; then
              echo "❌ No pubspec.yaml found — this doesn't look like a Flutter project"
              echo "Contents of extracted ZIP:"
              ls -la project-raw/
              exit 1
            fi

            echo "✅ Found Flutter project at: $PROJECT_ROOT"
            mv "$PROJECT_ROOT" project
          else
            echo "❌ No project source provided in payload"
            echo "Payload: $PAYLOAD"
            exit 1
          fi

          # Verify project structure
          echo "📋 Project contents:"
          ls -la project/

      - name: Build APK
        run: |
          cd project
          BUILD_TYPE=$(echo '${{ github.event.inputs.payload }}' | jq -r '.buildType // "release"')

          # 🛠️ Auto-fix Android v1 embedding to v2 embedding
          echo "🛠️ Checking for Android v1 embedding & old configs..."
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if grep -q "io.flutter.app.FlutterApplication" "$MANIFEST"; then
              echo "⚠️ Found v1 embedding in AndroidManifest.xml! Auto-patching..."
              sed -i 's/android:name="io.flutter.app.FlutterApplication"/android:name="${applicationName}"/g' "$MANIFEST"
            fi
            # Remove old splash screen meta-data which sometimes causes issues
            sed -i '/io.flutter.app.android.SplashScreenUntilFirstFrame/d' "$MANIFEST"
          fi

          # Fix MainActivity.java or MainActivity.kt
          find android/app/src/main/java android/app/src/main/kotlin -name "MainActivity.*" -type f 2>/dev/null | while read f; do
            if grep -q "io.flutter.app.FlutterActivity" "$f"; then
               echo "⚠️ Found v1 embedding in $f! Auto-patching..."
               sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' "$f"
               # Some older files override onCreate, we'll just replace the import and let it be, 
               # but often the onCreate in v1 calls GeneratedPluginRegistrant which is removed in v2.
               # To be safe, we will just use flutter create to regenerate the android folder if v1 is detected.
            fi
          done

          # Safer v1 to v2 migration: Let flutter recreate the android folder
          if grep -q "io.flutter.app.FlutterApplication" "$MANIFEST" 2>/dev/null; then
            echo "⚠️ Recreating android folder to fix v1 embedding properly..."
            flutter create . || true
          fi

          # 🛠️ Auto-fix build.gradle for compileSdk 36 (required by newer plugins)
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
             sed -i 's/compileSdkVersion[[:space:]]\+[0-9]\+/compileSdkVersion 36/g' "$BUILD_GRADLE"
             sed -i 's/compileSdk[[:space:]]\+[0-9]\+/compileSdk 36/g' "$BUILD_GRADLE"
             echo "✅ Updated compileSdk to 36 in $BUILD_GRADLE"
          fi
          BUILD_GRADLE_KTS="android/app/build.gradle.kts"
          if [ -f "$BUILD_GRADLE_KTS" ]; then
             sed -i 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]*/compileSdk = 36/g' "$BUILD_GRADLE_KTS"
             sed -i 's/compileSdkVersion[[:space:]]*=[[:space:]]*[0-9]*/compileSdk = 36/g' "$BUILD_GRADLE_KTS"
             echo "✅ Updated compileSdk to 36 in $BUILD_GRADLE_KTS"
          fi

          flutter clean
          flutter pub get

          if [ "$BUILD_TYPE" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.jobId }}
          path: |
            project/build/app/outputs/flutter-apk/app-release.apk
            project/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
